<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BimDex – Linz Straßenbahn Sammelpass</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bim-orange: #D85A30;
      --bim-orange-light: #FAECE7;
      --bim-orange-dark: #4A1B0C;
      --bim-teal: #1D9E75;
      --bim-teal-light: #E1F5EE;
      --bg: #ffffff;
      --bg2: #f5f4f0;
      --border: rgba(0,0,0,0.12);
      --txt: #1a1a18;
      --txt2: #6b6a66;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a;
        --bg2: #252522;
        --border: rgba(255,255,255,0.12);
        --txt: #f0efe8;
        --txt2: #999890;
        --bim-orange-light: #3a1a0d;
        --bim-orange-dark: #f5c4b3;
      }
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg2);
      color: var(--txt);
      min-height: 100vh;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 2rem 1rem 4rem;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      gap: 12px;
      flex-wrap: wrap;
    }

    .title { font-size: 36px; font-weight: 800; letter-spacing: -1.5px; line-height: 1; color: var(--bim-orange); }
    .subtitle { font-size: 13px; font-family: 'Space Mono', monospace; color: var(--txt2); margin-top: 5px; }

    .stats { display: flex; gap: 8px; flex-wrap: wrap; }
    .stat {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 8px 16px;
      text-align: center;
      min-width: 76px;
    }
    .stat-num { font-size: 24px; font-weight: 700; color: var(--bim-orange); font-family: 'Space Mono', monospace; }
    .stat-label { font-size: 11px; font-family: 'Space Mono', monospace; color: var(--txt2); margin-top: 2px; }

    /* PROGRESS */
    .progress-label { font-size: 12px; font-family: 'Space Mono', monospace; color: var(--txt2); margin-bottom: 6px; }
    .progress-bar-wrap { background: var(--bg); border-radius: 99px; height: 8px; margin-bottom: 1.75rem; overflow: hidden; border: 0.5px solid var(--border); }
    .progress-bar-fill { height: 100%; background: var(--bim-orange); border-radius: 99px; transition: width 0.4s ease; }

    /* FORM CARD */
    .form-card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }
    .form-title { font-size: 14px; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 14px; color: var(--txt); }

    .form-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
    .form-group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 120px; }
    .form-group label { font-size: 12px; font-family: 'Space Mono', monospace; color: var(--txt2); }

    input[type="number"], input[type="text"], select {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      padding: 8px 10px;
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--bg2);
      color: var(--txt);
      outline: none;
      width: 100%;
      transition: border-color 0.15s;
    }
    input:focus, select:focus { border-color: var(--bim-orange); }
    input[type="number"] { max-width: 110px; }

    .btn-add {
      background: var(--bim-orange);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      padding: 10px 20px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s, transform 0.1s;
      flex-shrink: 0;
    }
    .btn-add:hover { opacity: 0.85; }
    .btn-add:active { transform: scale(0.97); }

    .error { font-size: 12px; color: #E24B4A; font-family: 'Space Mono', monospace; margin-top: 8px; min-height: 16px; }

    /* FILTER */
    .filter-row { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
    .filter-label { font-size: 12px; font-family: 'Space Mono', monospace; color: var(--txt2); }
    .filter-btn {
      background: transparent;
      border: 0.5px solid var(--border);
      border-radius: 99px;
      padding: 4px 14px;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      cursor: pointer;
      color: var(--txt2);
      transition: all 0.15s;
    }
    .filter-btn.active { background: var(--bim-orange); border-color: var(--bim-orange); color: #fff; }
    .filter-btn:hover:not(.active) { border-color: var(--bim-orange); color: var(--bim-orange); }

    /* GRID */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }

    .bim-card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 12px;
      position: relative;
      transition: border-color 0.15s, transform 0.1s;
      animation: fadeIn 0.2s ease;
    }
    .bim-card:hover { border-color: var(--bim-orange); transform: translateY(-1px); }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    .bim-card-num {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -1px;
      color: var(--bim-orange);
      font-family: 'Space Mono', monospace;
      line-height: 1;
    }
    .bim-card-linie {
      font-size: 11px;
      font-family: 'Space Mono', monospace;
      background: var(--bim-orange-light);
      color: var(--bim-orange-dark);
      display: inline-block;
      padding: 2px 8px;
      border-radius: 99px;
      margin: 6px 0 2px;
    }
    .bim-card-ort {
      font-size: 12px;
      color: var(--txt2);
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .bim-card-date { font-size: 10px; font-family: 'Space Mono', monospace; color: var(--txt2); margin-top: 6px; opacity: 0.7; }

    .btn-del {
      position: absolute;
      top: 8px;
      right: 8px;
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--txt2);
      font-size: 13px;
      line-height: 1;
      padding: 2px 4px;
      opacity: 0.35;
      transition: opacity 0.15s, color 0.15s;
      border-radius: 4px;
    }
    .btn-del:hover { opacity: 1; color: #E24B4A; }

    /* EMPTY STATE */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--txt2);
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      border: 0.5px dashed var(--border);
      border-radius: var(--radius-lg);
      line-height: 1.8;
    }
    .empty-icon { font-size: 36px; display: block; margin-bottom: 10px; }

    /* FOTO */
    .foto-gruppe { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 140px; }
    .foto-gruppe label { font-size: 12px; font-family: 'Space Mono', monospace; color: var(--txt2); }
    .btn-foto {
      display: flex; align-items: center; gap: 8px;
      background: transparent; border: 0.5px solid var(--border);
      border-radius: var(--radius-md); padding: 8px 12px;
      font-family: 'Syne', sans-serif; font-size: 13px; color: var(--txt2);
      cursor: pointer; transition: border-color 0.15s, color 0.15s;
      width: 100%;
    }
    .btn-foto:hover { border-color: var(--bim-orange); color: var(--bim-orange); }
    .foto-vorschau {
      width: 100%; max-height: 80px; object-fit: cover;
      border-radius: var(--radius-md); border: 0.5px solid var(--border);
      display: none;
    }
    /* verstecktes file-input – wird per Klick auf btn-foto ausgelöst */
    #inp-foto { display: none; }

    /* Foto auf der Karte */
    .bim-card-foto {
      width: 100%; aspect-ratio: 4/3; object-fit: cover;
      border-radius: var(--radius-md); margin-bottom: 8px;
      border: 0.5px solid var(--border);
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <div>
        <div class="title">BimDex</div>
        <div class="subtitle">Linz Straßenbahn Sammelpass</div>
      </div>
      <div class="stats">
        <div class="stat">
          <div class="stat-num" id="s-total">0</div>
          <div class="stat-label">gesammelt</div>
        </div>
        <div class="stat">
          <div class="stat-num" id="s-missing">65</div>
          <div class="stat-label">noch offen</div>
        </div>
      </div>
    </div>

    <div class="progress-label" id="progress-label">0 von 65 Garnituren entdeckt</div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-bar" style="width: 0%"></div>
    </div>

    <div class="form-card">
      <div class="form-title">Neue Bim eintragen</div>
      <div class="form-row">
        <div class="form-group">
          <label>Nummer (Pflichtfeld)</label>
          <input type="number" id="inp-num" placeholder="z.B. 042" min="1" max="999" />
        </div>
        <div class="form-group">
          <label>Linie</label>
          <select id="inp-linie">
            <option value="">— wählen —</option>
            <option>Linie 1</option>
            <option>Linie 2</option>
            <option>Linie 3</option>
            <option>Linie 4</option>
          </select>
        </div>
        <div class="form-group">
          <label>Ort (optional)</label>
          <input type="text" id="inp-ort" placeholder="z.B. Hauptplatz" />
        </div>

        <!-- FOTO-FELD: Ein verstecktes <input type="file"> öffnet die Kamera.
             accept="image/*" = nur Bilder erlaubt
             capture="environment" = direkt die Rückkamera auf dem Handy öffnen -->
        <div class="foto-gruppe">
          <label>Foto (optional)</label>
          <input type="file" id="inp-foto" accept="image/*" capture="environment" onchange="fotoGewaehlt(this)" />
          <button class="btn-foto" onclick="document.getElementById('inp-foto').click()">
            📷 Foto aufnehmen
          </button>
          <!-- Vorschau-Bild, wird sichtbar sobald ein Foto gewählt wurde -->
          <img id="foto-vorschau" class="foto-vorschau" alt="Vorschau" />
        </div>
        <button class="btn-add" onclick="addBim()">+ Eintragen</button>
      </div>
      <div class="error" id="form-error"></div>
    </div>

    <div class="filter-row">
      <span class="filter-label">Filter:</span>
      <button class="filter-btn active" onclick="setFilter('alle', this)">Alle</button>
      <button class="filter-btn" onclick="setFilter('Linie 1', this)">Linie 1</button>
      <button class="filter-btn" onclick="setFilter('Linie 2', this)">Linie 2</button>
      <button class="filter-btn" onclick="setFilter('Linie 3', this)">Linie 3</button>
      <button class="filter-btn" onclick="setFilter('Linie 4', this)">Linie 4</button>
    </div>

    <div class="grid" id="grid"></div>

  </div>

  <script>
    let entries = JSON.parse(localStorage.getItem('bim-jagd') || '[]');
    let activeFilter = 'alle';
    let aktiveFotoBase64 = null; // hier wird das Foto zwischengespeichert

    function save() {
      localStorage.setItem('bim-jagd', JSON.stringify(entries));
    }

    // Wird aufgerufen sobald der Nutzer ein Foto auswählt oder fotografiert.
    // FileReader liest die Bilddatei als Base64-Text, damit wir sie speichern können.
    function fotoGewaehlt(input) {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        aktiveFotoBase64 = e.target.result; // Base64-String speichern
        const vorschau = document.getElementById('foto-vorschau');
        vorschau.src = aktiveFotoBase64;
        vorschau.style.display = 'block'; // Vorschau anzeigen
      };
      reader.readAsDataURL(file); // Bild als Base64 lesen
    }

    function addBim() {
      const numRaw = document.getElementById('inp-num').value.trim();
      const linie = document.getElementById('inp-linie').value;
      const ort = document.getElementById('inp-ort').value.trim();
      const errEl = document.getElementById('form-error');
      errEl.textContent = '';

      if (!numRaw) { errEl.textContent = 'Bitte eine Garniturnummer eingeben!'; return; }
      const num = parseInt(numRaw);
      if (isNaN(num) || num < 1 || num > 999) { errEl.textContent = 'Nummer muss zwischen 1 und 999 liegen.'; return; }
      const numStr = String(num).padStart(3, '0');
      if (entries.find(e => e.num === numStr)) { errEl.textContent = 'Diese Bim hast du schon!'; return; }

      // foto: aktiveFotoBase64 enthält das Bild als Base64, oder null wenn kein Foto
      entries.push({ num: numStr, linie, ort, foto: aktiveFotoBase64, date: new Date().toLocaleDateString('de-AT') });
      entries.sort((a, b) => a.num.localeCompare(b.num));

      try {
        save();
      } catch(e) {
        // localStorage voll (zu viele Fotos) – Eintrag trotzdem anzeigen, aber warnen
        errEl.textContent = 'Speicher voll! Eintrag ohne Foto gespeichert.';
        entries[entries.length-1].foto = null;
        save();
      }

      render();

      // Formular zurücksetzen
      document.getElementById('inp-num').value = '';
      document.getElementById('inp-ort').value = '';
      document.getElementById('inp-linie').value = '';
      document.getElementById('inp-foto').value = '';
      document.getElementById('foto-vorschau').style.display = 'none';
      aktiveFotoBase64 = null;
    }

    function deleteBim(num) {
      if (!confirm('Bim #' + num + ' wirklich löschen?')) return;
      entries = entries.filter(e => e.num !== num);
      save();
      render();
    }

    function setFilter(f, btn) {
      activeFilter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function render() {
      const total = entries.length;
      const pct = Math.round((total / 65) * 100);
      document.getElementById('s-total').textContent = total;
      document.getElementById('s-missing').textContent = 65 - total;
      document.getElementById('progress-bar').style.width = pct + '%';
      document.getElementById('progress-label').textContent =
        total + ' von 65 Garnituren entdeckt (' + pct + '%)';

      const filtered = activeFilter === 'alle'
        ? entries
        : entries.filter(e => e.linie === activeFilter);

      const grid = document.getElementById('grid');

      if (filtered.length === 0) {
        grid.innerHTML = `
          <div class="empty">
            <span class="empty-icon">🚋</span>
            Noch keine Bims hier.<br>Los geht's – fang an zu sammeln!
          </div>`;
        return;
      }

      grid.innerHTML = filtered.map(e => `
        <div class="bim-card">
          <button class="btn-del" onclick="deleteBim('${e.num}')" title="Löschen">✕</button>
          <!-- Foto anzeigen falls vorhanden – src enthält den gespeicherten Base64-String -->
          ${e.foto ? `<img class="bim-card-foto" src="${e.foto}" alt="Bim ${e.num}" />` : ''}
          <div class="bim-card-num">#${e.num}</div>
          ${e.linie ? `<div class="bim-card-linie">${e.linie}</div>` : ''}
          ${e.ort ? `<div class="bim-card-ort">${e.ort}</div>` : ''}
          <div class="bim-card-date">${e.date}</div>
        </div>
      `).join('');
    }

    // Enter-Taste zum Eintragen
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') addBim();
    });

    render();
  </script>
</body>
</html>
